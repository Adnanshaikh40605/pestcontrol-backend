name: pest_99_partner_app
description: Pest Control 99 — Technician Partner App
publish_to: 'none'
version: 2.0.3+5

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  dio: ^5.9.0
  connectivity_plus: ^6.1.4
  package_info_plus: ^8.3.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.4
  image_picker: ^1.1.2
  intl: ^0.20.2
  url_launcher: ^6.3.1
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/logo/app_icon_foreground.png
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo/splash_logo.png
  android_12:
    color: "#FFFFFF"
    image: assets/logo/splash_logo.png
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/
    - assets/sounds/
