    body {

<body class="bg-background text-text-primary antialiased min-h-screen flex justify-center">
<div class="w-full max-w-[480px] bg-background min-h-screen flex flex-col shadow-sm relative">
<!-- Minimal Header for Focused View (Back-to-Main Exception) -->
<header class="flex items-center justify-center px-screen-edge h-[80px] shrink-0 pt-4">
<img alt="Pest Control 99 Logo" class="h-16 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCz5GGwXSzoGZt88finQRaD8ZxGdVykNyPc3TGzZGJaeryWoi8UpKB90I5zYfs_mKTu9ykvEZk_9Vtvb21HAZ7aoQaLZxxkqr_-O7l2aRq1oHZorgpCFLwFpAQqDfxquUn81T9-IkS8dkKkEBi3SE07k0sLQFS3zMjnBNAD0-lvP38qkVPD-yVekkaPmh3Cr-UGMP82rBRRUQfjxt5T407YCMtWJwOoSolIcDMXJvLKqSTrL_V0Yza14XWtUU3udjI-32cKUAJe58G"/>
</header>
<!-- Main Content -->
<main class="flex-1 px-screen-edge pb-[100px] flex flex-col mt-4">
<div class="mb-section-gap pt-2">
<h1 class="font-headline-lg text-text-primary">Create Account</h1>
<p class="font-body-md text-text-secondary mt-1">Join as a service partner to manage bookings.</p>
</div>
<form class="flex flex-col gap-element-gap">
<!-- Full Name Field -->
<div class="flex flex-col">
<label class="font-label-lg text-text-secondary mb-1" for="fullName">Full Name</label>
<input class="w-full h-[52px] px-card-padding bg-surface border border-border rounded-lg font-body-lg text-text-primary placeholder:text-text-secondary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="fullName" placeholder="Enter your full name" type="text"/>
</div>
<!-- Mobile Number Field -->
<div class="flex flex-col">
<label class="font-label-lg text-text-secondary mb-1" for="mobileNumber">Mobile Number</label>
<input class="w-full h-[52px] px-card-padding bg-surface border border-border rounded-lg font-body-lg text-text-primary placeholder:text-text-secondary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="mobileNumber" placeholder="Enter your mobile number" type="tel"/>
</div>
<!-- Password Field -->
<div class="flex flex-col">
<label class="font-label-lg text-text-secondary mb-1" for="password">Password</label>
<div class="relative w-full">
<input class="w-full h-[52px] pl-card-padding pr-12 bg-surface border border-border rounded-lg font-body-lg text-text-primary placeholder:text-text-secondary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="password" placeholder="Create a strong password" type="password"/>
<button class="absolute right-0 top-0 h-[52px] w-12 flex items-center justify-center text-text-secondary hover:text-text-primary transition-colors" tabindex="-1" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- User Type Dropdown (Mobile trigger style) -->
<div class="flex flex-col">
<label class="font-label-lg text-text-secondary mb-1" for="userType">User Type</label>
<div class="relative w-full">
<select class="w-full h-[52px] pl-card-padding pr-12 bg-surface border border-border rounded-lg font-body-lg text-text-primary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary appearance-none transition-shadow cursor-pointer" id="userType">
<option disabled="" selected="" value="">Select your role</option>
<option value="technician">Technician</option>
<option value="technician_admin">Technician Admin</option>
</select>
<div class="absolute right-4 top-0 bottom-0 flex items-center pointer-events-none text-text-secondary">
<span class="material-symbols-outlined text-[24px]" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
</div>
</form>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 right-0 w-full max-w-[480px] mx-auto bg-background/90 backdrop-blur-md p-screen-edge border-t border-border/50 z-10 pb-[max(20px,env(safe-area-inset-bottom))]">
<button class="w-full min-h-[52px] bg-primary hover:bg-primary-container active:bg-surface-tint text-on-primary font-headline-sm rounded-lg flex items-center justify-center transition-colors shadow-[0_4px_12px_rgba(0,107,40,0.2)]" type="submit">
                Create Account
            </button>
</div>
</div>
</body></html>
