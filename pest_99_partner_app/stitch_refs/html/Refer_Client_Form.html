            "borderRadius": {

            "spacing": {

            "fontSize": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F7FAF8;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md antialiased">
<!-- Top App Bar -->
<header class="bg-surface dark:bg-surface-dim text-primary dark:text-primary-fixed font-headline-md text-headline-md docked full-width top-0 sticky z-50 border-b border-border dark:border-outline-variant flex justify-between items-center px-screen-edge py-3 w-full">
<div class="flex items-center gap-3">
<button class="hover:bg-surface-container-low transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-headline-sm font-headline-sm text-primary dark:text-primary-fixed">Refer Client</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">notifications</span>
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant">
<img alt="Technician Profile Picture" data-alt="A professional high-resolution headshot of a friendly pest control technician wearing a neat green polo shirt. The lighting is bright and natural, suggesting an outdoor or well-lit office environment. The style is modern and corporate with a clean, approachable aesthetic that fits the premium field service app branding." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAziuY5R2X8_fOI-NDjIMcs_AtC_DLKaiY72cPWkXGih9FTvzV2Xw-GpdE0Be4ov5zFYqYtL6lydqawcIWhfUiG9dyRnKCxgZHXhwfsQDiyiHHQ2y_oRbZChmJBSKKp1ZP69ERTEkzg_PY1WbE7piMS6kQsjtWxFR6FK6BFccGPxSYtpzC_5r1-Z4EsO2B46XigCQ2vzROQv-BXJsk-sRPiBmsDV5_49Pdz9vcifRP5hdqOBfHMBAfVkbDfUrzGJWGfZugzIx2t1rLY"/>
</div>
</div>
</header>
<main class="max-w-md mx-auto px-screen-edge py-section-gap pb-32">
<!-- Hero Illustration / Visual Context -->
<div class="mb-section-gap bg-surface border border-border rounded-xl overflow-hidden p-6 shadow-sm flex flex-col items-center text-center">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-4 text-on-primary-container">
<span class="material-symbols-outlined !text-4xl" style="font-variation-settings: 'FILL' 1;">handshake</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Spread the Word</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Refer a new client and help us grow. Every referral earns you professional loyalty points.</p>
</div>
<!-- Referral Form -->
<section class="space-y-element-gap">
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface" for="client_name">Client Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface border border-border rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none font-body-lg text-body-lg text-on-surface transition-all" id="client_name" placeholder="Enter full name" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface" for="mobile_number">Mobile Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">phone_iphone</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface border border-border rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none font-body-lg text-body-lg text-on-surface transition-all" id="mobile_number" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface" for="notes">Notes (Optional)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-4 text-outline">description</span>
<textarea class="w-full pl-12 pr-4 py-4 bg-surface border border-border rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none font-body-lg text-body-lg text-on-surface transition-all resize-none" id="notes" placeholder="Mention pest type, urgent requirements or best time to contact..." rows="4"></textarea>
</div>
</div>
</section>
<!-- Informational Card (Bento Style) -->
<div class="mt-section-gap grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant">
<span class="material-symbols-outlined text-primary mb-2">verified</span>
<p class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider">Verification</p>
<p class="font-body-md text-body-md text-on-surface font-semibold">Immediate Lead Validation</p>
</div>
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant">
<span class="material-symbols-outlined text-tag-orange mb-2">stars</span>
<p class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider">Rewards</p>
<p class="font-body-md text-body-md text-on-surface font-semibold">50 Loyalty Points</p>
</div>
</div>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 w-full p-screen-edge bg-surface/80 backdrop-blur-md border-t border-border z-40">
<div class="max-w-md mx-auto">
<button class="w-full h-[52px] bg-primary text-on-primary font-headline-sm text-headline-sm rounded-xl shadow-lg hover:bg-on-primary-fixed-variant transition-all active:scale-95 flex items-center justify-center gap-2">
                Submit Referral
                <span class="material-symbols-outlined">send</span>
</button>
</div>
</div>
</body></html>
