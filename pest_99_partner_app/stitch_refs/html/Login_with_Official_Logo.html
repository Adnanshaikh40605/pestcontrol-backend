<body class="bg-surface text-text-primary font-body-md min-h-screen flex flex-col antialiased">
<!-- Minimal Header for Focused View -->
<header class="flex items-center px-screen-edge py-4 w-full max-w-md mx-auto">
<button aria-label="Go back" class="w-[48px] h-[48px] flex items-center justify-center -ml-3 rounded-full hover:bg-surface-container-lowest active:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-text-primary" style="font-variation-settings: 'wght' 300;">arrow_back</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-screen-edge w-full max-w-md mx-auto pb-8">
<!-- Logo Section -->
<div class="flex justify-center mt-6 mb-8">
<div class="w-28 h-28 rounded-[1.5rem] bg-surface shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-border flex items-center justify-center bg-cover bg-center overflow-hidden"><img alt="Pest Control 99 Logo" class="w-full h-full object-contain p-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCz5GGwXSzoGZt88finQRaD8ZxGdVykNyPc3TGzZGJaeryWoi8UpKB90I5zYfs_mKTu9ykvEZk_9Vtvb21HAZ7aoQaLZxxkqr_-O7l2aRq1oHZorgpCFLwFpAQqDfxquUn81T9-IkS8dkKkEBi3SE07k0sLQFS3zMjnBNAD0-lvP38qkVPD-yVekkaPmh3Cr-UGMP82rBRRUQfjxt5T407YCMtWJwOoSolIcDMXJvLKqSTrL_V0Yza14XWtUU3udjI-32cKUAJe58G"/></div>
</div>
<!-- Heading -->
<div class="text-center mb-10">
<h1 class="font-headline-lg text-[32px] leading-tight text-text-primary tracking-[-0.015em]">Welcome Back</h1>
<p class="font-body-md text-text-secondary mt-2">Sign in to your partner account</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-section-gap">
<!-- Phone Number Input -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-text-primary" for="phone">Phone Number</label>
<div class="relative">
<input class="w-full h-[52px] px-card-padding rounded-lg border border-border bg-surface text-text-primary text-[16px] placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" id="phone" placeholder="Enter your phone number" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-text-primary" for="password">Password</label>
<div class="relative flex items-center">
<input class="w-full h-[52px] pl-card-padding pr-[48px] rounded-lg border border-border bg-surface text-text-primary text-[16px] placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" id="password" placeholder="Enter your password" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 w-[40px] h-[40px] flex items-center justify-center text-text-secondary hover:text-text-primary transition-colors rounded-full" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-[-8px]">
<a class="font-label-lg text-primary hover:text-surface-tint transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Actions -->
<div class="mt-4 flex flex-col gap-4">
<button class="w-full h-[52px] bg-primary text-on-primary font-headline-sm rounded-lg flex items-center justify-center shadow-[0_4px_12px_rgba(0,107,40,0.15)] hover:bg-surface-tint active:scale-[0.98] transition-all" type="submit">
                    Login
                </button>
<button class="w-full h-[52px] text-primary font-headline-sm rounded-lg flex items-center justify-center hover:bg-success-bg active:bg-surface-container-high transition-colors" type="button">
                    Register
                </button>
</div>
</form>
